<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Journal des connexions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        th {
            background: #222;
        }

        tr:hover {
            background: #1f1f1f;
        }
    </style>
</head>
<body>
    <h1>🔐 Journal des connexions et actions</h1>

    <table>
        <thead>
            <tr>
                <th>Date / Heure</th>
                <th>Utilisateur</th>
                <th>Action</th>
                <th>IP</th>
                <th>User-Agent</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.created_at.strftime('%d/%m/%Y %H:%M:%S') }}</td>
                <td>{{ log.username or '-' }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.ip or '-' }}</td>
                <td>{{ log.user_agent or '-' }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">Aucun log.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
